<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 30%, #1a1a24 0%, #0a0a0f 60%, #050507 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.4rem 1rem;
    margin-bottom: 1.5rem;
    border: 1px solid rgba(255, 150, 100, 0.4);
    border-radius: 999px;
    color: #ffb088;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  h1 {
    margin: 0;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #ffffff 0%, #ffd9c4 60%, #ff9a6c 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 60px rgba(255, 154, 108, 0.35);
  }

  p.sub {
    margin: 1.25rem 0 0;
    max-width: 32rem;
    color: #9a97a8;
    font-size: 1.05rem;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <main>
    <span class="badge">✓ Проверка пройдена</span>
    <h1>Тест успешен</h1>
    <p class="sub">Страница загружена и отрендерена корректно.</p>
  </main>
</body>
</html>
